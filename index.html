<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyVerse — Learn Everything, Everywhere</title>
<meta name="description" content="StudyVerse is a free, comprehensive learning platform covering Science, Humanities, Commerce, Technology, and Competitive Exam preparation.">
<meta name="theme-color" content="#060610">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --lime:#C8FF00;--pink:#FF2D87;--blue:#00CFFF;--purple:#9D4EDD;
  --orange:#FF6B35;--gold:#FFD700;--teal:#20B2AA;--red:#FF4757;
  --bg:#060610;--bg2:#0C0C1D;--bg3:#12122A;--bg4:#1A1A36;
  --card:rgba(255,255,255,0.035);--card-hover:rgba(255,255,255,0.06);
  --card-border:rgba(255,255,255,0.08);
  --glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.1);
  --text:#FFFFFF;--text2:rgba(255,255,255,0.65);--text3:rgba(255,255,255,0.35);
  --radius:16px;--radius-lg:24px;--radius-xl:32px;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
  --transition:0.3s cubic-bezier(0.4,0,0.2,1);
  --font:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
  --font-head:'Bricolage Grotesque',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.65;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,h5,h6{font-family:var(--font-head);line-height:1.2}
a{color:var(--blue);text-decoration:none;transition:color var(--transition)}
a:hover{color:var(--lime)}
::selection{background:var(--purple);color:#fff}
img{max-width:100%;display:block}
button{font-family:var(--font);cursor:pointer}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}

.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
#starfield{position:absolute;inset:0}
.mesh-grad{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.15;will-change:transform}
.mesh-grad.m1{width:600px;height:600px;background:radial-gradient(circle,var(--purple),transparent 70%);top:-15%;left:-10%;animation:meshFloat 25s ease-in-out infinite}
.mesh-grad.m2{width:500px;height:500px;background:radial-gradient(circle,var(--blue),transparent 70%);bottom:-10%;right:-8%;animation:meshFloat 20s ease-in-out infinite reverse}
.mesh-grad.m3{width:400px;height:400px;background:radial-gradient(circle,var(--lime),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:meshFloat 30s ease-in-out infinite 5s}
@keyframes meshFloat{0%{transform:translate(0,0) scale(1)}25%{transform:translate(40px,-50px) scale(1.1)}50%{transform:translate(-30px,40px) scale(0.9)}75%{transform:translate(20px,-20px) scale(1.05)}100%{transform:translate(0,0) scale(1)}}

.container{max-width:1240px;margin:0 auto;padding:0 24px;position:relative;z-index:1}

header{position:sticky;top:0;z-index:100;background:rgba(6,6,16,0.65);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);border-bottom:1px solid var(--card-border);transition:background var(--transition)}
header.scrolled{background:rgba(6,6,16,0.9)}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 0;gap:16px}
.logo{font-family:var(--font-head);font-size:1.45rem;font-weight:800;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-icon{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 4px 16px rgba(157,78,221,0.3)}
.nav-center{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center;}
.nav-center a{color:var(--text2);font-size:0.85rem;font-weight:500;padding:7px 14px;border-radius:10px;transition:all var(--transition)}
.nav-center a:hover{color:var(--text);background:rgba(255,255,255,0.06);text-decoration:none}
.nav-center a.active{color:var(--lime);background:rgba(200,255,0,0.08)}
.nav-right{display:flex;align-items:center;gap:10px}
.search-trigger{background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:8px 16px;color:var(--text2);font-size:0.82rem;display:flex;align-items:center;gap:8px;transition:all var(--transition)}
.search-trigger:hover{border-color:var(--purple);color:var(--text);box-shadow:0 0 20px rgba(157,78,221,0.15)}
.search-trigger kbd{background:rgba(255,255,255,0.08);border-radius:5px;padding:2px 7px;font-size:0.7rem;font-family:var(--font-mono)}

.hero{text-align:center;padding:100px 0 60px;position:relative}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(157,78,221,0.15),rgba(0,207,255,0.1));border:1px solid rgba(157,78,221,0.25);border-radius:100px;padding:7px 20px 7px 14px;font-size:0.8rem;font-weight:600;color:var(--purple);margin-bottom:28px;}
.hero h1{font-size:clamp(2.6rem,6.5vw,5rem);font-weight:800;letter-spacing:-0.025em;margin-bottom:20px;}
.hero h1 .grad{background:linear-gradient(135deg,var(--lime) 0%,var(--blue) 40%,var(--purple) 80%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{font-size:1.15rem;color:var(--text2);max-width:620px;margin:0 auto 40px;}
.hero-actions{display:flex;justify-content:center;gap:14px;margin-bottom:60px;flex-wrap:wrap}
.btn{padding:13px 28px;border-radius:14px;font-size:0.92rem;font-weight:600;border:none;cursor:pointer;transition:all var(--transition);display:inline-flex;align-items:center;gap:8px;font-family:var(--font)}
.btn-primary{background:linear-gradient(135deg,var(--purple),#7B2FBE);color:#fff;box-shadow:0 4px 20px rgba(157,78,221,0.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(157,78,221,0.5)}
.btn-secondary{background:var(--glass);border:1px solid var(--glass-border);color:var(--text)}
.btn-secondary:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2);transform:translateY(-2px)}
.hero-stats{display:flex;justify-content:center;gap:48px;}
.stat{text-align:center}
.stat-value{font-family:var(--font-head);font-size:2.2rem;font-weight:800}
.stat-label{font-size:0.8rem;color:var(--text3);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em}

.categories{padding:20px 0 80px}
.section-head{text-align:center;margin-bottom:40px}
.section-head h2{font-size:2rem;font-weight:800;margin-bottom:8px}
.cat-tabs{display:flex;gap:6px;overflow-x:auto;padding:4px;margin:0 auto 40px;justify-content:center;flex-wrap:wrap;background:var(--glass);border:1px solid var(--card-border);border-radius:16px;max-width:fit-content}
.cat-tab{padding:10px 20px;border-radius:12px;font-size:0.88rem;font-weight:600;border:none;background:transparent;color:var(--text2);cursor:pointer;transition:all var(--transition);white-space:nowrap;}
.cat-tab:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.cat-tab.active{background:linear-gradient(135deg,var(--purple),rgba(0,207,255,0.8));color:#fff;box-shadow:0 4px 16px rgba(157,78,221,0.3)}
.cat-section{display:none}
.cat-section.active{display:block;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.cat-section .cat-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.cat-section .cat-header h2{font-size:1.6rem;font-weight:700}
.subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.subject-card{position:relative;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius-lg);padding:28px;cursor:pointer;transition:all 0.35s cubic-bezier(0.4,0,0.2,1);overflow:hidden;}
.subject-card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(0,0,0,0.4);border-color:transparent}
.subject-card .s-glow{position:absolute;top:0;right:0;width:120px;height:120px;border-radius:50%;filter:blur(60px);opacity:0;transition:opacity 0.4s;pointer-events:none}
.subject-card:hover .s-glow{opacity:0.15}
.subject-card .s-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin-bottom:16px;position:relative;z-index:1}
.subject-card h3{font-size:1.08rem;font-weight:700;margin-bottom:8px;}
.subject-card .s-desc{font-size:0.82rem;color:var(--text3);line-height:1.55;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.subject-card .s-footer{display:flex;align-items:center;justify-content:space-between;}
.subject-card .s-topics{font-size:0.75rem;color:var(--text3);background:rgba(255,255,255,0.05);padding:5px 12px;border-radius:100px;display:flex;align-items:center;gap:5px}
.s-progress{position:absolute;bottom:0;left:0;height:3px;background:var(--lime);border-radius:0 3px 0 0;transition:width var(--transition);z-index:2}

.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);display:none;opacity:0;transition:opacity 0.3s}
.modal-overlay.open{display:block;opacity:1}
.modal{position:fixed;top:0;right:0;bottom:0;width:100%;max-width:1000px;background:var(--bg2);border-left:1px solid var(--card-border);z-index:201;transform:translateX(100%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;overflow:hidden}
.modal.open{transform:translateX(0)}
.modal-progress{position:absolute;top:0;left:0;right:0;height:3px;z-index:10}
.modal-progress-bar{height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));width:0;transition:width 0.2s;border-radius:0 2px 2px 0}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:1px solid var(--card-border);flex-shrink:0;background:var(--bg2)}
.modal-head-left{display:flex;align-items:center;gap:14px;}
.modal-head .m-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;}
.modal-close{width:38px;height:38px;border-radius:10px;border:1px solid var(--card-border);background:var(--glass);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all var(--transition);}
.modal-body{flex:1;overflow-y:auto;padding:0}
.modal-body::-webkit-scrollbar{width:4px}
.modal-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:99px}
.topic-list-view{padding:24px 28px}
.topic-item{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:14px;background:var(--card);border:1px solid var(--card-border);cursor:pointer;transition:all var(--transition);margin-bottom:8px}
.topic-item:hover{background:var(--card-hover);transform:translateX(4px)}
.topic-item .t-num{width:32px;height:32px;border-radius:10px;background:rgba(157,78,221,0.1);color:var(--purple);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;}
.topic-item .t-info h4{font-size:0.92rem;font-weight:600;margin-bottom:2px}
.topic-item .t-info .t-meta{font-size:0.72rem;color:var(--text3);display:flex;gap:12px}
.topic-content-view{display:none;padding:28px}
.topic-content-view.active{display:block;animation:slideIn 0.35s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.topic-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.topic-back-btn{display:inline-flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--text2);cursor:pointer;padding:8px 14px;border-radius:10px;border:1px solid var(--card-border);background:var(--glass);}
.topic-meta{display:flex;gap:12px;align-items:center}
.topic-meta span{font-size:0.75rem;color:var(--text3);}
.mark-done-btn{font-size:0.78rem;padding:6px 14px;border-radius:8px;border:1px solid rgba(200,255,0,0.3);background:rgba(200,255,0,0.08);color:var(--lime);cursor:pointer;font-family:var(--font);font-weight:600}
.mark-done-btn.done{background:var(--lime);color:var(--bg);border-color:var(--lime)}

.overview-box{background:linear-gradient(135deg,rgba(157,78,221,0.08),rgba(0,207,255,0.04));border:1px solid rgba(157,78,221,0.18);border-radius:var(--radius);padding:22px 26px;margin-bottom:32px;font-size:0.9rem;color:var(--text2);line-height:1.8;position:relative;}
.c-section{margin-bottom:32px}
.c-section h3{font-size:1.15rem;font-weight:700;margin-bottom:16px;padding-left:14px;border-left:3px solid var(--purple);}
.c-section .c-body{font-size:0.88rem;color:var(--text2);line-height:1.85}
.c-body pre{background:var(--bg);border:1px solid var(--card-border);border-radius:14px;padding:18px 22px;overflow-x:auto;margin:16px 0;}
.c-body code{background:rgba(200,255,0,0.08);color:var(--lime);padding:2px 7px;border-radius:5px;}
.formula-box{background:rgba(200,255,0,0.03);border:1px solid rgba(200,255,0,0.12);border-radius:var(--radius);padding:22px 26px;margin-bottom:28px}
.review-box{background:rgba(0,207,255,0.03);border:1px solid rgba(0,207,255,0.12);border-radius:var(--radius);padding:22px 26px}
.review-q{margin-bottom:12px;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.05);transition:border-color var(--transition)}
.review-q .rq-question{padding:14px 18px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;font-size:0.88rem;font-weight:600;background:rgba(255,255,255,0.02);}
.review-q .rq-answer{display:none;padding:0 18px 16px 52px;font-size:0.84rem;color:var(--text2);line-height:1.8;}
.review-q.open .rq-answer{display:block;}

.ai-btn { background: linear-gradient(135deg, #FF2D87, #9D4EDD); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: all var(--transition); display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; margin-bottom: 16px; box-shadow: 0 4px 15px rgba(157,78,221,0.2); }
.ai-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(157,78,221,0.4); }
.ai-loading { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.ai-result-box { background: rgba(157,78,221,0.08); border: 1px solid rgba(157,78,221,0.3); border-radius: 12px; padding: 22px 26px; margin-bottom: 24px; display: none; font-size: 0.9rem; line-height: 1.6; }
.ai-quiz-option { display: block; padding: 12px 16px; margin: 8px 0; background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); border-radius: 10px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
.ai-quiz-option:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
.ai-quiz-option.correct { background: rgba(200,255,0,0.12); border-color: var(--lime); color: var(--lime); }
.ai-quiz-option.wrong { background: rgba(255,71,87,0.12); border-color: var(--red); color: var(--red); }

.auth-overlay { position: fixed; inset: 0; z-index: 250; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
.auth-overlay.open { display: flex; opacity: 1; }
.auth-card { background: var(--bg2); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); width: 100%; max-width: 440px; padding: 36px; box-shadow: var(--shadow); position: relative; animation: authFadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
@keyframes authFadeIn { from { transform: scale(0.9) translateY(15px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
.auth-card-close { position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: var(--text2); font-size: 1.1rem; }
.auth-title { font-family: var(--font-head); font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; text-align: center; }
.auth-input { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px 16px; color: var(--text); width: 100%; outline: none; transition: all var(--transition); margin-bottom: 12px;}
.auth-input:focus { border-color: var(--purple); }
.auth-btn { background: linear-gradient(135deg, var(--purple), var(--blue)); color: #fff; font-weight: 700; border: none; padding: 13px; border-radius: 12px; width: 100%; cursor: pointer; transition: all var(--transition); }
.profile-trigger { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; position: relative; transition: all var(--transition); }
.profile-status-dot { position: absolute; bottom: 2px; right: 2px; width: 8px; height: 8px; background: var(--text3); border-radius: 50%; border: 2px solid var(--bg); transition: background var(--transition); }
.profile-status-dot.active { background: var(--lime); }
.pricing-overlay { position: fixed; inset: 0; z-index: 250; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; overflow-y: auto; padding: 40px 24px; }
.pricing-overlay.open { display: flex; }
.pricing-card-wrap { background: var(--bg2); border: 1px solid var(--glass-border); border-radius: var(--radius-xl); width: 100%; max-width: 960px; padding: 44px; box-shadow: var(--shadow); position: relative; }
.pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px;}
.pricing-plan-card { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius-lg); padding: 32px; display: flex; flex-direction: column; position: relative; overflow: hidden; }

.chat-trigger { position: fixed; bottom: 28px; right: 28px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--purple), var(--blue)); color: #fff; border: none; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 150; box-shadow: 0 4px 20px rgba(157,78,221,0.4); transition: all var(--transition); }
.chat-trigger:hover { transform: scale(1.08) rotate(5deg); box-shadow: 0 8px 30px rgba(157,78,221,0.6); }
.chat-window { position: fixed; bottom: 100px; right: 28px; width: 380px; height: 500px; background: var(--bg2); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); z-index: 151; box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; opacity: 0; transform: translateY(20px) scale(0.95); pointer-events: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.chat-window.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: all; }

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// Powerful context-aware generator to simulate massive, highly detailed datasets dynamically.

  const domains = [
    {
      keys: ['physic', 'mechanic', 'electromagnet', 'quantum', 'thermo', 'optic', 'astrophysic', 'kinematics'],
      f: ["F = G(m₁m₂)/r² (Newton's Law of Universal Gravitation)", "E = mc² (Mass-Energy Equivalence)", "∮ E·dA = q/ε₀ (Gauss's Law)", "iℏ(∂Ψ/∂t) = ĤΨ (Schrödinger Equation)"],

      f: ["PV = nRT (Ideal Gas Law)", "pH = pKa + log([A⁻]/[HA]) (Henderson-Hasselbalch Equation)", "ΔG = ΔH - TΔS (Gibbs Free Energy)"],
      o: "Comprehensive study of molecular composition, complex reaction kinetics, and chemical thermodynamics.",

      s2: "<p>Analysis of reaction mechanisms, transition states, and molecular interactions.</p><ul><li>Valence Bond Theory, VSEPR, and Molecular Orbital Theory</li><li>Stereochemistry, chirality, and complex reaction pathways (SN1, SN2, E1, E2)</li><li>Spectroscopic identification methods (NMR, IR, Mass Spectrometry)</li></ul>",

let activeCat='science';
let currentUser = null; 

const DONE_KEY='studyverse_done';
function getDone(){try{return JSON.parse(localStorage.getItem(DONE_KEY))||{}}catch(e){return{}}}
function setDone(key,val){const d=getDone();if(val)d[key]=1;else delete d[key];localStorage.setItem(DONE_KEY,JSON.stringify(d))}
function isDone(key){return!!getDone()[key]}
function doneKey(cat,sub,topic){return `${cat}::${sub}::${topic}`}
function countDone(cat,sub){const d=getDone();const prefix=`${cat}::${sub}::`;return Object.keys(d).filter(k=>k.startsWith(prefix)).length}

function buildAll(){
  const tabWrap=document.getElementById('catTabs');
  tabWrap.innerHTML=Object.entries(CATS).map(([k,c])=>`<button class="cat-tab${k===activeCat?' active':''}" data-cat="${k}">${c.label}</button>`).join('');
  tabWrap.querySelectorAll('.cat-tab').forEach(t=>t.addEventListener('click',()=>switchCat(t.dataset.cat)));
  
  const secWrap=document.getElementById('catSections');
  secWrap.innerHTML='';
  let totalSub=0,totalTopic=0;
  
  Object.entries(CATS).forEach(([catKey,cat])=>{
    const data=cat.content();const subs=Object.keys(data);
    const sec=document.createElement('div');
    sec.className='cat-section'+(catKey===activeCat?' active':'');
    sec.id='cs-'+catKey;
    let cards='';
    subs.forEach(sn=>{
      const s=data[sn];const topics=Object.keys(s.topics||{});
      const done=countDone(catKey,sn);const pct=topics.length?Math.round(done/topics.length*100):0;
      totalSub++;totalTopic+=topics.length;
      cards+=`<div class="subject-card" style="--accent:${s.color||'var(--purple)'}" onclick="openModal('${catKey}','${esc(sn)}')">
        <div class="s-icon" style="background:${(s.color||'#9D4EDD')}18">${s.icon||'📘'}</div>
        <h3>${sn}</h3>
        <p class="s-desc">${s.description||''}</p>
        <div class="s-footer">
          <span class="s-topics">📝 ${topics.length} topics ${done?' ✅ '+done:''}</span>
        </div>
        ${pct>0?`<div class="s-progress" style="width:${pct}%"></div>`:''}
      </div>`;
    });
    sec.innerHTML=`<div class="cat-header"><h2>${cat.label}</h2></div><div class="subject-grid">${cards}</div>`;
    secWrap.appendChild(sec);
  });
  document.getElementById('cntSubjects').textContent = totalSub;
  document.getElementById('cntTopics').textContent = totalTopic;
}

function switchCat(cat){
  activeCat=cat;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.toggle('active',t.dataset.cat===cat));
  document.querySelectorAll('.cat-section').forEach(s=>s.classList.toggle('active',s.id==='cs-'+cat));
  document.querySelectorAll('#navLinks a').forEach(a=>a.classList.toggle('active',a.dataset.cat===cat));
}
function navSwitch(cat){ switchCat(cat); document.querySelector('.categories').scrollIntoView({behavior:'smooth'}); }

let currentModal={cat:'',sub:''};
function openModal(catKey,subName){
  const data=CATS[catKey].content();const subject=data[subName];
  if(!subject)return;
  currentModal={cat:catKey,sub:subName};
  document.getElementById('mIcon').textContent=subject.icon||'📘';
  document.getElementById('mTitle').textContent=subName;
  document.getElementById('mDesc').textContent=subject.description||'';
  
  const topics=Object.keys(subject.topics||{});
  let html=`<div class="topic-list-view" id="tlView">`;
  topics.forEach((tn,i)=>{
    const k=doneKey(catKey,subName,tn);const done=isDone(k);
    html+=`<div class="topic-item" onclick="showTopic('${esc(tn)}')">
      <span class="t-num">${i+1}</span>
      <div class="t-info"><h4>${tn}</h4></div>
      <span style="font-size:1.2rem" class="topic-status-marker">${done?'✅':'→'}</span>
    </div>`;
  });
  html+=`</div><div class="topic-content-view" id="tcView"></div>`;
  document.getElementById('mBody').innerHTML=html;
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function showTopic(topicName){
  const data=CATS[currentModal.cat].content();
  const topic=data[currentModal.sub]?.topics?.[topicName];
  if(!topic)return;
  document.getElementById('tlView').style.display='none';
  const tc=document.getElementById('tcView');
  tc.className='topic-content-view active';
  const dk=doneKey(currentModal.cat,currentModal.sub,topicName);
  const done=isDone(dk);
  const isPremium = currentUser && currentUser.plan !== 'Free';

  let html=`<div class="topic-nav">
    <button class="topic-back-btn" onclick="backToList()">← All Topics</button>
    <div class="topic-meta">
      ${isPremium ? `<button class="mark-done-btn" style="background:var(--purple); color:#fff; border:none;" onclick="exportPDF()">📄 Export PDF</button>` : `<button class="mark-done-btn" style="background:transparent; color:var(--pink); border-color:var(--pink);" onclick="openPricingModal()">🔒 PDF (Pro)</button>`}
      <button class="mark-done-btn${done?' done':''}" onclick="toggleDone('${esc(dk)}',this)">${done?'✅ Completed':'Mark Complete'}</button>
    </div>
  </div>`;
  
  html+=`<div class="topic-title-bar"><h2 style="font-size:2rem; margin-bottom:20px;">${topicName}</h2></div>`;
  
  html+=`<div style="display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;">
    <button class="ai-btn" id="btn-summary" onclick="generateSummary('${esc(topicName)}')">✨ AI Summary</button>
    <button class="ai-btn" id="btn-quiz" onclick="generateQuiz('${esc(topicName)}')">✨ AI Quiz Generator</button>
  </div><div class="ai-result-box" id="ai-result-box"></div>`;
  
  html+=`<div class="overview-box">${topic.overview||''}</div>`;
  (topic.sections||[]).forEach(sec=>{
    html+=`<div class="c-section"><h3>${sec.title}</h3><div class="c-body">${sec.content}</div></div>`;
  });
  
  html+=`<div style="background:rgba(255,255,255,0.02); padding:20px; border-radius:12px; margin-bottom:30px;">
    <h3 style="color:var(--blue); margin-bottom:10px;">📺 Premium Video Lectures</h3>
    ${isPremium ? `
      <div style="display:flex; gap:10px; margin-bottom:10px;">
        <input type="text" id="ytQuery" placeholder="Search YouTube lectures..." class="auth-input" style="margin:0;">
        <button onclick="searchYT()" class="auth-btn" style="width:auto; margin:0;">Search</button>
      </div>
    ` : `<span style="color:var(--pink); cursor:pointer; font-size:0.9rem;" onclick="openPricingModal()">💎 Unlock Live YT Search (Pro)</span>`}
    <div style="margin-top:10px; padding-bottom:56.25%; position:relative; border-radius:12px; overflow:hidden;">
      <iframe id="ytPlayer" src="https://www.youtube.com/embed/zojyEEFNnHM" style="position:absolute; width:100%; height:100%; border:none;"></iframe>
    </div>
  </div>`;
  
  if(topic.keyFormulas?.length){ html+=`<div class="formula-box"><h3>📐 Key Formulas</h3><ul>${topic.keyFormulas.map(f=>`<li>${f}</li>`).join('')}</ul></div>`; }
  if(topic.reviewQuestions?.length){
    html+=`<div class="review-box"><h3>🧠 Review Questions</h3>`;
    topic.reviewQuestions.forEach((rq,i)=>{ html+=`<div class="review-q" onclick="this.classList.toggle('open')"><div class="rq-question">Q${i+1}: ${rq.q}</div><div class="rq-answer">${rq.a}</div></div>`; });
    html+=`</div>`;
  }
  
  tc.innerHTML=html;
  document.getElementById('modal').scrollTop=0;
}

function searchYT() {
  const query = document.getElementById('ytQuery').value.trim();
  if(!query) return;
  document.getElementById('ytPlayer').src = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(query)}`;
}

function backToList(){ document.getElementById('tlView').style.display='block'; document.getElementById('tcView').className='topic-content-view'; document.getElementById('tcView').innerHTML=''; openModal(currentModal.cat, currentModal.sub); /* refresh lists */ }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); document.getElementById('modal').classList.remove('open'); document.body.style.overflow = ''; }

function toggleDone(key, btn) {
  if (!currentUser) { openAuthModal(); showToast('Log in to track progress!', 'error'); return; }
  const isCompleted = isDone(key);
  setDone(key, !isCompleted);
  if(!isCompleted) { btn.classList.add('done'); btn.textContent = '✅ Completed'; showToast('Topic marked as completed!');} 
  else { btn.classList.remove('done'); btn.textContent = 'Mark Complete'; }
  buildAll(); // Refresh UI counts in background
  updateProfileStats();
}

function exportPDF() {
  showToast('Generating PDF Document... Check your downloads.', 'success');
  setTimeout(()=>window.print(), 1000);
}

function openAuthModal() {
  document.getElementById('authOverlay').classList.add('open');
  if (currentUser) {
    document.getElementById('authScreenLogin').style.display='none';
    document.getElementById('authScreenProfile').style.display='block';
    document.getElementById('profileName').textContent=currentUser.name;
    document.getElementById('profileEmail').textContent=currentUser.email;
    document.getElementById('profilePlanType').textContent=currentUser.plan;
    document.getElementById('profilePlanBadge').textContent=currentUser.plan==='Free'?'BASIC STUDENT':currentUser.plan.toUpperCase()+' MEMBER';
    updateProfileStats();
  } else {
    document.getElementById('authScreenProfile').style.display='none';
    document.getElementById('authScreenLogin').style.display='block';
  }
}
function closeAuthModal() { document.getElementById('authOverlay').classList.remove('open'); }
function updateProfileStats() { if(currentUser) document.getElementById('profileDoneCount').textContent = Object.keys(getDone()).length; }

function handleLogin(e) {
  e.preventDefault();
  const inputVal = document.getElementById('loginId').value.trim();
  const isPhone = /^\d{10}$/.test(inputVal);
  const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(inputVal);
  if (!isPhone && !isEmail) { showToast("Please enter a valid 10-digit mobile number or email address.", "error"); return; }
  
  currentUser = { name: isEmail ? inputVal.split('@')[0] : 'User_' + inputVal.slice(-4), email: inputVal, plan: 'Free' };
  document.getElementById('headerStatusDot').classList.add('active');
  closeAuthModal();
  showToast(`Successfully logged in as ${currentUser.name}!`);
}

function handleLogout() { currentUser = null; document.getElementById('headerStatusDot').classList.remove('active'); closeAuthModal(); showToast('Logged out successfully.'); }

  if (!currentUser) { closePricingModal(); openAuthModal(); showToast('Please log in to upgrade.', 'error'); return; }

  document.getElementById('payPlanName').textContent = name + ' Member';
  document.getElementById('payPlanPrice').textContent = '₹' + price;
  document.getElementById('payOverlay').style.display = 'flex';
}

function executePayment(e) {
  e.preventDefault();
  const btn = document.getElementById('paySubmitBtn');
  btn.textContent = 'Processing Secure Payment...'; btn.disabled = true;
  
  setTimeout(() => {
     currentUser.plan = document.getElementById('payPlanName').textContent.includes('Max') ? 'Max' : 'Pro';
     showToast(`Payment Successful! Welcome to ${currentUser.plan} Plan. Premium features unlocked.`);
     btn.textContent = 'Pay Now'; btn.disabled = false;
     closePayModal();
     // Refresh open modal to unlock features dynamically if looking at a topic
     if(currentModal.sub && document.getElementById('tcView').className.includes('active')) {
         showTopic(document.querySelector('.topic-title-bar h2').textContent);
     }

}

function openSearch() { document.getElementById('searchOvl').classList.add('open'); setTimeout(()=>document.getElementById('searchInput').focus(),100); }
function closeSearch() { document.getElementById('searchOvl').classList.remove('open'); document.getElementById('searchInput').value=''; document.getElementById('searchResults').innerHTML=''; }

function doSearch(q) {
  const resWrap = document.getElementById('searchResults');
  if(!q.trim()) { resWrap.innerHTML=''; return; }
  const query = q.toLowerCase(); let results = [];
  
  Object.entries(CATS).forEach(([catKey, cat]) => {
    const data = cat.content();
    Object.keys(data).forEach(sub => {
      if(sub.toLowerCase().includes(query)) results.push({ cat: catKey, sub: sub, title: sub, type: 'Subject' });
      Object.keys(data[sub].topics||{}).forEach(top => {
        if(top.toLowerCase().includes(query)) results.push({ cat: catKey, sub: sub, top: top, title: top, type: 'Topic' });
      });
    });
  });
  
  results = results.slice(0, 10);
  if(!results.length) { resWrap.innerHTML='<div style="color:var(--text3); padding:10px;">No results found.</div>'; return; }
  resWrap.innerHTML = results.map(r => `
    <div style="padding:16px; background:var(--card); margin-bottom:8px; border-radius:8px; cursor:pointer; border:1px solid var(--card-border);" 
         onclick="closeSearch(); switchCat('${r.cat}'); openModal('${r.cat}','${esc(r.sub)}'); ${r.top?`setTimeout(()=>showTopic('${esc(r.top)}'),100);`:''}">
      <strong style="color:var(--blue)">${r.title}</strong>
      <div style="font-size:0.8rem; color:var(--text3)">${r.type} in ${CATS[r.cat].label}</div>
    </div>
  `).join('');
}

async function callGeminiMock(prompt, type) {
  // Simulating Gemini API Network latency since we don't have a live key injected here.
  return new Promise(resolve => {
    setTimeout(() => {
      if(type === 'summary') resolve("• This is an AI generated summary based on the text.<br>• It extracts the core concepts theoretically and contextually.<br>• Perfect for quick revision before university exams.");
      if(type === 'quiz') resolve({
        questions: [
          { q: "What is the primary focus of this topic module?", options: ["Core foundational principles", "Irrelevant data", "Historical dates only", "None of the above"], answerIndex: 0 },
          { q: "How is the theoretical framework mostly applied?", options: ["It isn't applied", "Through industry relevant scenarios", "Random guessing", "Only in ancient history"], answerIndex: 1 },
          { q: "Which equation format is standard for this subject?", options: ["x = y + z", "Output = Σ (Inputs * Variables)", "E = mc^2", "a^2 + b^2 = c^2"], answerIndex: 1 }
        ]
      });
      if(type === 'chat') resolve(`As your AI tutor for ${currentModal.sub || 'StudyVerse'}, I can tell you that this subject is crucial. Could you specify which part you are struggling with?`);
    }, 1500);
  });
}

async function generateSummary(topicName) {
  if(!currentUser || currentUser.plan === 'Free') { openPricingModal(); return; }
  const btn = document.getElementById('btn-summary'); const box = document.getElementById('ai-result-box');
  const ogText = btn.innerHTML; btn.innerHTML = '<span class="ai-loading"></span> Summarizing...'; btn.disabled = true;

async function generateQuiz(topicName) {
  if(!currentUser || currentUser.plan === 'Free') { openPricingModal(); return; }
  const btn = document.getElementById('btn-quiz'); const box = document.getElementById('ai-result-box');
  const ogText = btn.innerHTML; btn.innerHTML = '<span class="ai-loading"></span> Generating...'; btn.disabled = true;
  box.style.display = 'block'; box.innerHTML = '<em style="color:var(--text3);">✨ Gemini is crafting a custom quiz...</em>';
  
  const res = await callGeminiMock("Quiz", "quiz");
  window.currentAiQuiz = res.questions;
  let qHtml = `<h3 style="color:var(--lime); margin-bottom:12px;">✨ Dynamic AI Quiz</h3>`;
  res.questions.forEach((q, qIndex) => {
     qHtml += `<div style="margin-bottom: 20px;">
        <p style="font-weight: 600; margin-bottom: 10px; color:var(--text);">${qIndex+1}. ${q.q}</p>
        ${q.options.map((opt, oIndex) => `<div class="ai-quiz-option" onclick="checkAnswer(this, ${qIndex}, ${oIndex})">${opt}</div>`).join('')}
     </div>`;
  });
  box.innerHTML = qHtml;
  btn.innerHTML = ogText; btn.disabled = false;
}

window.checkAnswer = function(el, qIndex, oIndex) {
   const q = window.currentAiQuiz[qIndex];
   const siblings = el.parentElement.querySelectorAll('.ai-quiz-option');
   siblings.forEach(s => s.style.pointerEvents = 'none'); 
   if (oIndex === q.answerIndex) { el.classList.add('correct'); el.innerHTML += ' <span style="float:right;">✅</span>'; } 
   else { el.classList.add('wrong'); el.innerHTML += ' <span style="float:right;">❌</span>'; siblings[q.answerIndex].classList.add('correct'); }
};

function toggleChatWindow() { document.getElementById('chatWindow').classList.toggle('open'); }

async function sendChatMessage() {
  if (!currentUser || currentUser.plan === 'Free') { openPricingModal(); showToast('Pro required for AI Chat.', 'error'); return; }
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim(); if(!text) return;
  
  const chat = document.getElementById('chatMessages');
  chat.innerHTML += `<div class="chat-msg user"><div class="chat-msg-bubble">${esc(text)}</div></div>`;
  inp.value = ''; chat.scrollTop = chat.scrollHeight;
  
  const botReply = await callGeminiMock(text, "chat");
  chat.innerHTML += `<div class="chat-msg bot"><div class="chat-msg-bubble">${botReply}</div></div>`;
  chat.scrollTop = chat.scrollHeight;
}

(function(){
  const c=document.getElementById('starfield'),ctx=c.getContext('2d');
  let stars=[];const COUNT=120;
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;init()}
  function init(){stars=[];for(let i=0;i<COUNT;i++)stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.2+0.3,a:Math.random()*0.6+0.1,d:Math.random()*0.0003+0.0001,p:Math.random()*Math.PI*2})}
  function draw(){ctx.clearRect(0,0,c.width,c.height);stars.forEach(s=>{s.p+=s.d;const a=s.a*(0.5+0.5*Math.sin(s.p*1000));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fill()});requestAnimationFrame(draw)}
  resize();draw();window.addEventListener('resize',resize)
})();
